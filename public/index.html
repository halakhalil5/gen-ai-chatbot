<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-gradient"></div>
    <div class="grain"></div>

    <main class="app-shell">
      <header class="top-bar">
        <div class="brand">
          <p class="eyebrow">Local AI Console</p>
          <h1>Nova Chat</h1>
          <p id="modeBadge" class="mode-badge">Mode: Chat</p>
        </div>
        
        <div class="controls-group">
          <div class="model-control">
            <label for="modelInput">Model</label>
            <input id="modelInput" value="openrouter/auto" />
          </div>
          <div class="model-control">
            <label for="userInput">User Name</label>
            <input id="userInput" value="user_001" />
          </div>
        </div>

        <form id="uploadForm" class="upload-control">
          <label for="documentInput">Upload Docs</label>
          <div class="upload-row">
            <input id="documentInput" type="file" multiple accept=".txt,.md,.csv,.json,.log,.py,.js,.html,.css,.pdf,application/pdf,.docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/*" />
            <button id="uploadBtn" type="submit">Index</button>
          </div>
          <div id="fileList" class="file-list"></div>
        </form>
      </header>

      <section id="chatWindow" class="chat-window" aria-live="polite"></section>

      <form id="chatForm" class="chat-form">
        <div class="chat-input-wrapper">
          <div id="imagePreview" class="image-preview"></div>
          <textarea
            id="messageInput"
            placeholder="Type your message..."
            rows="1"
            required
          ></textarea>
        </div>
        <div class="chat-actions">
          <label for="imageInputQuery" class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <input id="imageInputQuery" type="file" accept="image/*" style="display: none;" />
          </label>
          <button id="sendBtn" type="submit">Send</button>
        </div>
      </form>
    </main>

    <script src="app.js"></script>
  </body>
</html>
